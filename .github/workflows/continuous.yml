name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: ON

jobs:
  ####################
  # Linux
  ####################

  Linux:
    name: ${{ matrix.name }} (${{ matrix.config }}, ${{ matrix.threading }})
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        config: [DebugNoSymbols, Release]
        threading: [TBB]
        include:
          - os: ubuntu-latest
            name: Linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 10

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get -o Acquire::Retries=3 install ccache ninja-build
          echo 'CACHE_PATH=~/.cache/ccache' >> "$GITHUB_ENV"

      - name: Cache Build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache

      - name: Prepare ccache
        run: |
          # ccache --max-size=1.0G
          ccache -V && ccache --show-stats && ccache --zero-stats

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_CXX_FLAGS_DEBUGNOSYMBOLS="" \
            -DPOLYFEM_THREADING=${{ matrix.threading }} \
            -DPOLYFEM_WITH_BEZIER=OFF

      - name: Build
        run: cmake --build build && ccache --show-stats

      - name: Tests
        run: OMP_NUM_THREADS=1 ctest --test-dir build --verbose --output-on-failure

      # - name: Setup tmate session
      #   if: ${{ failure() }}
      #   uses: mxschmitt/action-tmate@v3

  ####################
  # MacOS
  ####################

  MacOS:
    name: ${{ matrix.os }} (${{ matrix.config }}, ${{ matrix.threading }})
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 3
      CTEST_PARALLEL_LEVEL: 3
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        config: [DebugNoSymbols, Release]
        threading: [TBB]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 10

      - name: Dependencies
        run: |
          brew install ccache ninja
          echo 'CACHE_PATH=~/Library/Caches/ccache' >> "$GITHUB_ENV"

      - name: Cache Build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache

      - name: Prepare ccache
        run: |
          ccache --max-size=1.0G
          ccache -V && ccache --show-stats && ccache --zero-stats

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_CXX_FLAGS_DEBUGNOSYMBOLS="" \
            -DPOLYFEM_THREADING=${{ matrix.threading }} \
            -DPOLYFEM_WITH_BEZIER=OFF

      - name: Build
        run: cmake --build build && ccache --show-stats

      - name: Tests
        run: ctest --test-dir build --verbose --output-on-failure

  ####################
  # Windows
  ####################

  Windows:
    runs-on: windows-2022
    env:
      SCCACHE_IDLE_TIMEOUT: "12000"
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
    strategy:
      fail-fast: false
      matrix:
        # You might be wondering why it's MinSizeRel instead of Release here.
        # The reason is that release build on windows is very buggy. Takes 2.5 
        # hours and cause 2 unit tests to segfault. 
        #
        # Track this bug at https://github.com/polyfem/polyfem/issues/467
        config: [DebugNoSymbols, MinSizeRel]
        threading: [CPP]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 10

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Dependencies
        run: |
          choco install -y sccache
          "SCCACHE_DIR=${env:LOCALAPPDATA}\Mozilla\sccache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.config }}-${{ matrix.threading }}-cache

      - name: Prepare sccache
        run: |
          sccache --max-size=1.0G
          sccache -V && sccache --show-stats && sccache --zero-stats

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake -G Ninja ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} ^
            -DCMAKE_CXX_FLAGS_DEBUGNOSYMBOLS="/Od" -DCMAKE_EXE_LINKER_FLAGS_DEBUGNOSYMBOLS="" ^
            -DPOLYFEM_WITH_BEZIER=OFF ^
            -DPOLYFEM_WITH_CLIPPER=OFF ^
            -DPOLYFEM_THREADING=${{ matrix.threading }} ^
            -DPOLYSOLVE_WITH_CHOLMOD=OFF ^
            -DPOLYSOLVE_WITH_AMGCL=OFF ^
            -DPOLYSOLVE_WITH_MKL=ON ^
            -B build ^
            -S .

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake --build build && sccache --show-stats

      - name: Tests
        run: ctest --test-dir build --verbose --output-on-failure
